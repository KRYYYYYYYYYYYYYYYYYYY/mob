name: Auto Update VPN

concurrency:
  group: vpn-manager-lock
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 */2 * * *'  # Запуск каждые 2 часа
  workflow_dispatch:        # Кнопка для ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cryptography

      - name: 🌪️ Setup "Censorship" Environment
        run: |
          # Используем 'replace' вместо 'add', чтобы избежать ошибки "Exclusivity flag on"
          sudo tc qdisc replace dev eth0 root netem delay 150ms 20ms loss 5%
          sudo ifconfig eth0 mtu 1280
      
      - name: Run checker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
          GH_PROMPT_DISABLED: 1
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python check.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Checker-Bot"
          git config --global user.email "bot@github.com"
          
          git add .
          git commit -m "Auto-update: DB and Subscription" || echo "No changes to commit"
          
          # Подтягиваем изменения, если они были в репозитории
          git pull --rebase -X theirs origin main
          git push origin main
