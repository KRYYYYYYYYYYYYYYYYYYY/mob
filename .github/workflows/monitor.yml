name: Server Monitor (Executioner)

concurrency:
  group: vpn-manager-lock
  cancel-in-progress: false
  
on:
  schedule:
    - cron: '*/15 * * * *' # Каждые 15 минут
  workflow_run:           # После завершения Auto Update VPN
    workflows: ["Auto Update VPN"]
    types:
      - completed
  workflow_dispatch:      # Кнопка ручного запуска

jobs:
  monitor:
    # ПРАВИЛЬНОЕ МЕСТО ДЛЯ IF:
    # Запускаем, если это НЕ сигнал от другого воркфлоу, 
    # ИЛИ если это сигнал и он был успешным.
    if: >
      github.event_name != 'workflow_run' || 
      github.event.workflow_run.conclusion == 'success'
    
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
      
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cryptography

      - name: Run Monitor
        run: python monitor.py

      - name: Save Clean Lists
        run: |
          git config --global user.name "Monitor-Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Monitor: Cleaned dead servers" || echo "No changes to commit"
          git pull --rebase -X theirs origin main
          git push origin main
