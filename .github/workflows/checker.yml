name: 🛡️ Proxy Inquisitor & Monitor

concurrency:
  group: proxy-inquisitor-lock
  # Для "кликов" лучше поставить true, чтобы если ты нажал 5 галок сразу, 
  # они не стояли в очереди часами, а последний запуск обработал всё сразу.
  cancel-in-progress: true 

on:
  workflow_dispatch:          # Запуск вручную
  schedule:
    - cron: '0 * * * *'       # Запуск раз в час
  issues:
    types: [edited]           # МГНОВЕННЫЙ ЗАПУСК ПРИ КЛИКЕ НА ГАЛОЧКУ

jobs:
  check:
    runs-on: ubuntu-latest
    # Запускаем, если это плановый запуск ИЛИ если редактируется Issue с меткой pin_control
    if: |
      github.event_name != 'issues' || 
      contains(github.event.issue.labels.*.name, 'pin_control')
    
    timeout-minutes: 360  
    permissions:
      contents: write  
      issues: write    

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⚙️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cryptography psutil

      - name: ⛓️ Run Torturer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }} # Передаем полный путь репозитория
        run: python torture_bot.py

      - name: 💾 Save Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "📊 Sync: Ranking and Vetted updated [skip ci]" || echo "No changes to commit"
          git pull --rebase -X theirs origin main
          git push origin main
