name: 🛡️ Proxy Inquisitor & Monitor

concurrency:
  group: proxy-inquisitor-lock
  cancel-in-progress: false # Новый запуск будет ждать, пока старый не доделает "пытки"

on:
  workflow_dispatch:        # Запуск вручную
  schedule:
    - cron: '0 * * * *'  # Запуск раз в час (в начале каждого часа)

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Даем права на запись в репозиторий

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⚙️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Если нужны библиотеки типа requests, добавь их сюда
          pip install requests cryptography
          python -m pip install psutil

      - name: ⛓️ Run Torturer
        run: python torture_bot.py # Новый скрипт "Инквизитор"

      - name: 💾 Save Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. Добавляем ВСЕ изменения
          git add .
          
          # 2. Коммитим (если есть что)
          git commit -m "📊 Sync: Ranking and Vetted updated [skip ci]" || echo "No changes to commit"
          
          # 3. Если остались какие-то «неучтенные» файлы, прячем их
          git stash
          
          # 4. Обновляем ветку
          git pull --rebase -X theirs origin main
          
          # 5. Возвращаем спрятанное (если оно было) и пушим
          git stash pop || echo "Nothing to pop"
          git push origin main
